<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benasque Valley Network</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        
        /* The Map Container: Set to a warm, paper-like background color */
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #faf8f5; 
        }

        /* Customizing our Nodes (Child-like dots) */
        .custom-node {
            background-color: #ff6b6b; /* Playful red */
            border: 3px solid #2d3436; /* Thick dark outline */
            border-radius: 50%;
            width: 16px;
            height: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .custom-node:hover {
            transform: scale(1.3); /* Grow a bit when hovered */
            background-color: #4ecdc4; /* Change color to mint */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map centered on the Benasque Valley
        // zoomControl: false removes the +/- buttons for a cleaner look
        var map = L.map('map', {
            zoomControl: false, 
            attributionControl: false
        }).setView([42.604, 0.523], 12); // Center of Benasque

        // Notice we are NOT adding a tileLayer (like OpenStreetMap). 
        // This keeps the background completely blank!

        // 2. Define our custom icon style
        var nodeIcon = L.divIcon({
            className: 'custom-node',
            iconSize: [20, 20],
            iconAnchor: [10, 10] // Centers the dot on the coordinate
        });

        // 3. Add your places (You will replace these with your 25 locations)
        var places = [
            { name: "Benasque", lat: 42.604, lon: 0.523 },
            { name: "Cerler", lat: 42.593, lon: 0.540 },
            { name: "Anciles", lat: 42.589, lon: 0.518 },
            { name: "Hospital de Benasque", lat: 42.684, lon: 0.613 }
        ];

        // Store markers to draw lines between them later
        var latLngs = [];

        // Loop through the places and add them to the map
        places.forEach(function(place) {
            // Create the node
            var marker = L.marker([place.lat, place.lon], { icon: nodeIcon }).addTo(map);
            
            // Add clickability (Popup)
            marker.bindPopup("<b>" + place.name + "</b><br>Click me for more info!");
            
            // Save coordinates for drawing lines
            latLngs.push([place.lat, place.lon]);
        });

        // 4. Draw connections between the nodes
        // This draws a line connecting them in the order they appear in the array. 
        // For specific connections, you would define specific pairs.
        var connections = L.polyline(latLngs, {
            color: '#2d3436', // Dark gray line
            weight: 3,        // Line thickness
            dashArray: '5, 10' // Makes it a dashed, playful line
        }).addTo(map);

    </script>
</body>
</html>
