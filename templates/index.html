<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benasque Algorithm Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* Leaflet override to remove default white square */
        .clear-background { background: none; border: none; } 
        
        /* The beautiful circular icon wrapper from your snippet */
        .custom-icon-wrapper {
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 50%; border: 2px solid #2c3e50;
            width: 26px; height: 26px; /* Fixed sizing for perfect circles */
            transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        .custom-icon-wrapper i { font-size: 13px; color: #2c3e50; }
        
        /* Optional: Make the glowing route look even better */
        .glowing-route { filter: drop-shadow(0px 0px 4px rgba(255, 0, 0, 0.8)); }

        /* Route Summary Styles */
        #route-summary {
            display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;
        }
        .summary-header { font-size: 16px; color: var(--text); margin-top: 0; margin-bottom: 10px; }
        .total-time-badge { 
            display: inline-block; background: #e8f4fd; color: var(--accent); 
            padding: 5px 10px; border-radius: 6px; font-weight: 600; font-size: 14px; margin-bottom: 15px; 
        }
        #step-list { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .step-item {
            padding: 10px; border-radius: 6px; background: #f8f9fa; margin-bottom: 8px; 
            border-left: 3px solid var(--accent); font-size: 13px;
        }
        .step-name { font-weight: 600; margin-bottom: 4px; color: var(--text); }
        .step-meta { color: #666; font-size: 11px; display: flex; gap: 10px; }
    </style>

    <style>
        :root { --bg: #fcfcfc; --text: #2c3e50; --accent: #3498db; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Sidebar UI */
        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 1000; padding: 25px;
        }
        h2 { margin-top: 0; font-size: 18px; color: var(--text); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #555; }
        
        select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: 'Inter'; }

        /* Toggle Switch */
        .switch-container { display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Button */
        button.run-btn {
            width: 100%; padding: 12px; background: var(--text); color: white;
            border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        button.run-btn:hover { background: #1a252f; }

        /* Node Icons */
        .custom-icon-wrapper {
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 50%; border: 2px solid #2c3e50;
            transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .custom-icon-wrapper i { font-size: 12px; color: #2c3e50; }

        @media (max-width: 768px) {
            #sidebar {
                top: auto;
                bottom: 0;
                left: 0;
                width: 100%;
                border-radius: 20px 20px 0 0; /* Only round the top corners */
                padding: 15px 20px;
                box-sizing: border-box;
                max-height: 50vh; /* Don't let it cover more than half the screen */
                overflow-y: auto; /* Allow scrolling within the sidebar */
            }
            
            /* Move Leaflet attribution and controls out of the way */
            .leaflet-control-container .leaflet-bottom {
                bottom: 50vh; 
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Pathfinder Controls</h2>
        
        <div class="control-group">
            <label>Difficulty</label>
            <select id="difficulty">
                <option value="easy">Easy (Scenic)</option>
                <option value="medium" selected>Medium (Standard)</option>
                <option value="hard">Hard (Direct/Steep)</option>
            </select>
        </div>

        <div class="control-group switch-container">
            <label style="margin: 0;">Season (Winter/Summer)</label>
            <label class="switch">
                <input type="checkbox" id="season-toggle" onchange="toggleSeason()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-group switch-container">
            <label style="margin: 0;">Allow Snow Routes</label>
            <label class="switch">
                <input type="checkbox" id="snow-toggle" checked onchange="handleSnowToggle()">
                <span class="slider"></span>
            </label>
        </div>

        <button class="run-btn" onclick="runAlgorithm()">Run Algorithm</button>

        <div id="route-summary">
            <h3 class="summary-header">Route Summary</h3>
            <div class="total-time-badge">
                <i class="fas fa-stopwatch"></i> Expected Time: <span id="total-time">0</span>
            </div>
            <div id="step-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([42.60, 0.52], 12);

        // Muted background map
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17, opacity: 0.4, attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Create separate layers
        const edgeLayer = L.layerGroup().addTo(map);
        const nodeLayer = L.layerGroup().addTo(map);
        const pathLayer = L.layerGroup().addTo(map);

        // FontAwesome Icons mapping
        const iconMap = {
            'Landmark': 'fa-monument', 'Peak': 'fa-mountain', 'Lake': 'fa-water',     
            'Urban': 'fa-city', 'Trail': 'fa-hiking', 'Mountain': 'fa-tree', 'Snow': 'fa-snowflake'      
        };

        // Pastel background colors for the icons
        const terrainColors = {
            'S': '#d4f1f9', 'M': '#9a8b71', 'U': '#b08d6a', 'T': '#f3e5ab'
        };

        let globalNodes = [];

        // Draws the icons based on the season
        function drawNodes(season) {
            nodeLayer.clearLayers(); 
            
            // 1. Check if the user wants to see snow nodes
            const snowEnabled = document.getElementById('snow-toggle').checked;

            globalNodes.forEach(node => {
                let activeTerrain = season === 'winter' ? node.terrain_winter : node.terrain_summer;
                
                // 2. If it's a snow node and the toggle is OFF, skip drawing it!
                if (!snowEnabled && activeTerrain === 'S') {
                    return; 
                }

                let bgColor = terrainColors[activeTerrain] || '#ffffff';
                let faClass = iconMap[node.type] || 'fa-map-pin'; 
                
                let customIcon = L.divIcon({
                    className: 'clear-background', 
                    html: `<div class="custom-icon-wrapper" style="background-color: ${bgColor}; border-color: #2c3e50;">
                            <i class="fas ${faClass}" style="color: #2c3e50;"></i>
                        </div>`,
                    iconSize: [30, 30], 
                    iconAnchor: [15, 15]
                });
                
                L.marker([node.lat, node.lon], {icon: customIcon})
                .bindPopup(`<b>${node.name}</b><br>Type: ${node.type}<br>Current Terrain: <b>${activeTerrain}</b>`)
                .addTo(nodeLayer);
            });
        }

        // New handleSnowToggle function
        function handleSnowToggle() {
            // Figure out the current season, then trigger a map redraw
            const seasonElement = document.getElementById('season-toggle');
            const season = (seasonElement && seasonElement.checked) ? 'summer' : 'winter';
            drawNodes(season);
        }

        // Called when the user clicks the Summer/Winter switch
        function toggleSeason() {
            const seasonElement = document.getElementById('season-toggle');
            const season = (seasonElement && seasonElement.checked) ? 'summer' : 'winter';
            drawNodes(season);
        }

        // Initial Fetch on page load
        fetch('/api/data')
            .then(response => response.json())
            .then(data => {
                globalNodes = data.nodes;
                data.edges.forEach(edge => {
                    L.polyline(edge, {color: '#333333', weight: 2, opacity: 0.6, dashArray: '4, 6'}).addTo(edgeLayer);
                });
                drawNodes('winter');
            });

        async function runAlgorithm() {
            const diffElement = document.getElementById('difficulty');
            // Handles both naming conventions just to be safe
            const snowElement = document.getElementById('snow-toggle') || document.getElementById('snow_toggle');
            const seasonElement = document.getElementById('season-toggle'); 
            
            const requestData = {
                difficulty: diffElement ? diffElement.value : 'medium', 
                allow_snow: snowElement ? snowElement.checked : true,
                season: (seasonElement && seasonElement.checked) ? 'summer' : 'winter'
            };

            try {
                const response = await fetch('/api/calculate_path', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                pathLayer.clearLayers();

                // Safety check: Make sure we have a valid path to draw
                if (data.path && data.path.length > 1) {
                    const route = L.polyline(data.path, { 
                        color: '#FF0000', weight: 6, opacity: 0.9, className: 'glowing-route' 
                    }).addTo(pathLayer);
                    
                    map.flyToBounds(route.getBounds(), {padding: [50, 50], duration: 1.5});
                    
                    // --- NEW: Populate Sidebar Summary ---
                    document.getElementById('route-summary').style.display = 'block';
                    
                    // Convert decimal hours (e.g., 1.5) to Hours and Minutes (1h 30m)
                    const hrs = Math.floor(data.total_time);
                    const mins = Math.round((data.total_time - hrs) * 60);
                    document.getElementById('total-time').innerText = `${hrs}h ${mins}m`;
                    
                    const stepList = document.getElementById('step-list');
                    stepList.innerHTML = ''; // Clear previous steps
                    
                    data.details.forEach((step, index) => {
                        let timeText = index === 0 ? "Start" : `+${Math.round(step.step_time * 60)} mins`;
                        
                        let stepHtml = `
                            <div class="step-item">
                                <div class="step-name">${index + 1}. ${step.name}</div>
                                <div class="step-meta">
                                    <span><i class="fas fa-walking"></i> ${timeText}</span>
                                    <span><i class="fas fa-mountain"></i> ${step.elevation}m</span>
                                </div>
                            </div>
                        `;
                        stepList.innerHTML += stepHtml;
                    });

                } else {
                    alert("The selected difficulty/constraints isolated the starting point. No valid paths found!");
                }
            } catch (err) {
                console.error("Error calculating path:", err);
                alert("The backend crashed! Check your Python terminal for the error.");
            }
        }
    </script>
</body>
</html>
